version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: mysql_reservas
    restart: always
    environment:
      MYSQL_DATABASE: proyecto_reservas
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - ./init/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - db_data:/var/lib/mysql

volumes:
  db_data: