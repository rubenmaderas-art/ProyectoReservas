services:
  # Base de datos MySQL
  db:
    image: mysql:8.0
    container_name: mysql_reservas
    restart: always
    environment:
      MYSQL_DATABASE: proyecto_reservas
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - ./init/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - db_data:/var/lib/mysql
    networks:
      - reservas-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # PhpMyAdmin - Gestor de BD
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin_reservas
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy
    networks:
      - reservas-network

volumes:
  db_data:

networks:
  reservas-network:
    driver: bridge

