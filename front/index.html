<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/isotipo-petalos.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Macrosad — Plataforma de reserva de vehículos de empresa. Gestiona disponibilidad, solicitudes y validaciones." />
  <title>Macrosad — Reserva de Vehículos</title>

  <!-- Google Fonts: preconnect a ambos dominios para reducir latencia DNS+TLS -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Carga no-bloqueante de la fuente: se carga como print y se activa al terminar -->
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
    media="print"
    onload="this.media='all'"
  />
  <!-- Fallback para navegadores sin JS -->
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </noscript>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
