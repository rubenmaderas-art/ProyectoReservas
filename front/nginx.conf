server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml application/atom+xml
        image/svg+xml font/woff font/woff2;

    # ── Cabeceras de seguridad (Lighthouse Best Practices) ──────────
    add_header X-Content-Type-Options   "nosniff"           always;
    add_header X-Frame-Options          "SAMEORIGIN"        always;
    add_header X-XSS-Protection         "1; mode=block"     always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP: 'unsafe-inline' en style-src es necesario por los estilos inline de React.
    # Si en el futuro se migra a CSS modules / className puro, eliminar 'unsafe-inline' de style-src.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # ── Proxy al backend (API + WebSockets) ─────────────────────────
    client_max_body_size 15m;

    location /api/ {
        proxy_pass         http://back-reservas-desarrollo:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /socket.io/ {
        proxy_pass         http://back-reservas-desarrollo:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    # ── Caché larga para assets con hash (JS, CSS, fuentes, imágenes)
    location ~* \.(js|css|woff2?|ttf|eot|otf|ico|png|jpg|jpeg|gif|webp|avif|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Sin caché para HTML (para que los deploys sean inmediatos) ──
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
        # Re-añadir cabeceras de seguridad (add_header dentro de location sobreescribe las globales)
        add_header X-Content-Type-Options  "nosniff"           always;
        add_header X-Frame-Options         "SAMEORIGIN"        always;
        add_header X-XSS-Protection        "1; mode=block"     always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    }

    # ── SPA fallback (React Router) ─────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
